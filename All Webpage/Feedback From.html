<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form | Indian Army Project</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(255, 255, 255, 0.1);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .radio-option input {
            cursor: pointer;
        }
        .button-row {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body class="subpage">

    <header id="main-header">
        <a href="../Index Indian Army.html" class="logo" style="text-decoration: none;">
            <span style="color: var(--secondary)">🇮🇳</span>
            INDIAN ARMY
        </a>
        <nav class="nav-links">
            <a href="../Index Indian Army.html">Home</a>
            <a href="History of Indian Army In English.html">History</a>
            <a href="Images.html">Gallery</a>
        </nav>
    </header>

    <div class="hero" style="height: 30vh; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://english.cdn.zeenews.com/sites/default/files/2022/01/31/1010344-indian-army-recruitment-jobs.jpg');">
        <div class="fade-up">
            <h1>Feedback</h1>
            <p>Your thoughts help us improve this tribute</p>
        </div>
    </div>

    <main class="container">
        <div class="glass form-container fade-up">
            <form action="mailto:Shreyanshg205@gmail.com" method="post" enctype="text/plain">
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="firstname">First Name</label>
                        <input type="text" id="firstname" name="Firstname" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label for="lastname">Last Name</label>
                        <input type="text" id="lastname" name="Lastname" placeholder="Enter last name">
                    </div>
                </div>

                <div class="grid" style="grid-template-columns: 1fr 2fr; gap: 20px;">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="text" id="age" name="Age" placeholder="Your age">
                    </div>
                    <div class="form-group">
                        <label for="school">School Name</label>
                        <input type="text" id="school" name="SchoolName" placeholder="Enter school name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="Gender" value="MALE"> Male
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="Gender" value="FEMALE"> Female
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="Gender" value="OTHER"> Other
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="Email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="remarks">Your Message / Remarks</label>
                    <textarea id="remarks" name="Remarks" rows="5" placeholder="Share your feedback here..."></textarea>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Submit Feedback</button>
                    <button type="reset" class="btn btn-outline" style="flex: 1;">Reset</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="logo footer-logo">INDIAN ARMY</div>
        <p class="copyright">&copy; 2026 Indian Army Fan Project. Saluting the Bravehearts.</p>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
